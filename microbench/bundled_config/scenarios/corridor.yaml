scenario:
  name: "corridor"
  description: "Two-way traffic in a narrow corridor."
  duration_s: 60.0

world:
  planar: true
  fixed_y_m: 0.0
  bounds:
    xmin: -70.0
    xmax: 70.0
    ymin: -1.0
    ymax: 1.0
    zmin: -20.0
    zmax: 20.0

agent_params:
  radius_m: 0.6
  v_max_mps: 3.0
  a_max_mps2: 2.0
  goal_tolerance_m: 1.0

goals:
  min_goal_distance_m: 50.0

obstacles:
  - aabb:
      center: [0.0, 0.0, 16.0]
      half: [75.0, 2.0, 3.0]
  - aabb:
      center: [0.0, 0.0, -16.0]
      half: [75.0, 2.0, 3.0]

spawn:
  type: "rect_to_rect"
  start_region:
    center: [-55.0, 0.0, 0.0]
    half: [6.0, 0.0, 11.0]
  goal_region:
    center: [55.0, 0.0, 0.0]
    half: [6.0, 0.0, 11.0]
